<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf8;--surface:#fff;--ink:#111;--ink-2:#444;--muted:#888;
  --line:#e8e6e1;--primary:#1a1a2e;--accent:#e8602c;
  --radius:10px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;}
body{display:flex;align-items:center;justify-content:center;}
.container{max-width:560px;padding:40px 24px;text-align:center;}
h1{font-size:clamp(32px,5vw,48px);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:20px;}
h1 em{color:var(--accent);font-style:normal;}
.desc{font-size:17px;color:var(--ink-2);margin-bottom:40px;line-height:1.7;}
.links{display:flex;flex-direction:column;gap:12px;}
a{
  padding:16px 24px;border:1px solid var(--line);border-radius:6px;
  text-decoration:none;color:var(--ink);font-weight:600;font-size:15px;
  transition:background .2s,border-color .2s;
}
a:hover{background:var(--surface);border-color:var(--accent);color:var(--accent);}
a.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
a.primary:hover{background:#2a2a3e;}
.meta{margin-top:60px;font-size:12px;color:var(--muted);}
</style>
